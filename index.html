<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Telegram Mini App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Mini App</h1>

<p id="info">Loading...</p>

<div id="adminPanel">
  <h2>ADMIN PANEL</h2>
  <p>Faqat siz ko‘rasiz</p>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const user = tg.initDataUnsafe?.user;

  // 🔴 SENING TELEGRAM ID
  const ADMIN_ID = 123456789;

  if (user) {
    document.getElementById("info").innerText =
      "Salom " + user.first_name + " | ID: " + user.id;

    if (user.id === ADMIN_ID) {
      document.getElementById("adminPanel").style.display = "block";
    }

  } else {
    document.getElementById("info").innerText =
      "Telegram orqali kiring";
  }
</script>

</body>
</html>
