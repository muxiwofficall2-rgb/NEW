<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Mini Builder Stable</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  transition: 0.3s;
}

.container {
  padding: 20px;
  text-align: center;
}

.panel {
  position: fixed;
  right: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: #1e293b;
  padding: 10px;
  overflow-y: auto;
}

.block {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
}

input, button {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
}

button {
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">Loading...</h1>
  <div id="content"></div>
</div>

<!-- ADMIN PANEL -->
<div class="panel" id="adminPanel">

<h3>ADMIN</h3>

<input id="text" placeholder="Text">
<button onclick="addText()">Add Text</button>

<input id="btnText" placeholder="Button text">
<input id="btnUrl" placeholder="Button URL">
<button onclick="addButton()">Add Button</button>

<input type="color" id="color">
<button onclick="setColor()">Change Color</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBzgk75uRWhGUFkBUl87oZRvJcumcRDfy8",
  authDomain: "newapp-1e180.firebaseapp.com",
  projectId: "newapp-1e180"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "site", "data");

/* LOAD */
onSnapshot(ref, (snap) => {
  const data = snap.data();
  if (!data) return;

  document.body.style.background = data.style?.bg || "#0f172a";
  document.body.style.color = data.style?.color || "white";

  document.getElementById("title").innerText = data.title || "My Site";

  render(data.blocks || []);
});

/* RENDER */
function render(blocks) {
  const box = document.getElementById("content");
  box.innerHTML = "";

  blocks.forEach(b => {

    if (b.type === "text") {
      const p = document.createElement("div");
      p.className = "block";
      p.innerText = b.value;
      box.appendChild(p);
    }

    if (b.type === "button") {
      const btn = document.createElement("button");
      btn.innerText = b.text;
      btn.onclick = () => window.open(b.url, "_blank");
      box.appendChild(btn);
    }

  });
}

/* ADD TEXT */
window.addText = async function () {
  const text = document.getElementById("text").value;

  const snap = await getDoc(ref);
  let data = snap.data() || {};

  let blocks = data.blocks || [];

  blocks.push({ type: "text", value: text });

  await setDoc(ref, {
    ...data,
    blocks
  });
};

/* ADD BUTTON */
window.addButton = async function () {
  const text = document.getElementById("btnText").value;
  const url = document.getElementById("btnUrl").value;

  const snap = await getDoc(ref);
  let data = snap.data() || {};

  let blocks = data.blocks || [];

  blocks.push({ type: "button", text, url });

  await setDoc(ref, {
    ...data,
    blocks
  });
};

/* COLOR */
window.setColor = async function () {
  const color = document.getElementById("color").value;

  const snap = await getDoc(ref);
  let data = snap.data() || {};

  await setDoc(ref, {
    ...data,
    style: {
      bg: color,
      color: "white"
    }
  });
};

</script>

</body>
</html>
