<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1 id="welcome">Loading...</h1>

<p id="userInfo"></p>

<button onclick="showData()">Show User Info</button>

<div id="adminPanel">
  <h2>ADMIN PANEL</h2>
  <p>Faqat siz ko‘rasiz</p>
  <button onclick="alert('Admin action')">Edit</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand(); // full screen

  const user = tg.initDataUnsafe?.user;

  const ADMIN_ID = 7359558983; // 🔴 BU YERGA O'Z TELEGRAM IDINGNI YOZ

  if (user) {
    document.getElementById("welcome").innerText =
      "Salom, " + user.first_name;

    document.getElementById("userInfo").innerText =
      "Your ID: " + user.id;

    // Admin tekshirish
    if (user.id === ADMIN_ID) {
      document.getElementById("adminPanel").style.display = "block";
    }
  } else {
    document.getElementById("welcome").innerText =
      "Telegram orqali kiring";
  }

  function showData() {
    alert(JSON.stringify(user, null, 2));
  }
</script>

</body>
</html>
