<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Mini Builder</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#adminPanel {
  display: none;
  background: #1e293b;
  padding: 10px;
  margin-top: 20px;
}

.btn {
  display: block;
  margin: 10px auto;
  width: 200px;
}
</style>
</head>

<body>

<h1 id="title">Loading...</h1>

<div id="buttons"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>ADMIN PANEL</h3>

  <input id="btnText" placeholder="Button text"><br><br>
  <input id="btnLink" placeholder="Link"><br><br>

  <button onclick="addButton()">➕ Add Button</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔴 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBzgk75uRWhGUFkBUl87oZRvJcumcRDfy8",
  authDomain: "newapp-1e180.firebaseapp.com",
  projectId: "newapp-1e180"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
const ADMIN_ID = 7359558983;

// ADMIN CHECK
if (user && user.id === ADMIN_ID) {
  document.getElementById("adminPanel").style.display = "block";
}

// DB REF
const ref = doc(db, "site", "data");

// REALTIME LOAD
onSnapshot(ref, (snap) => {
  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("title").innerText = data.title || "No title";

  renderButtons(data.buttons || []);
});

// RENDER BUTTONS
function renderButtons(buttons) {
  const container = document.getElementById("buttons");
  container.innerHTML = "";

  buttons.forEach((btn, index) => {
    const el = document.createElement("button");
    el.className = "btn";
    el.innerText = btn.text;

    el.onclick = () => {
      window.open(btn.link, "_blank");
    };

    container.appendChild(el);
  });
}

// ADD BUTTON (ADMIN ONLY)
window.addButton = async function () {
  const text = document.getElementById("btnText").value;
  const link = document.getElementById("btnLink").value;

  const snap = await getDoc(ref);
  let data = snap.exists() ? snap.data() : {};

  let buttons = data.buttons || [];

  buttons.push({ text, link });

  await setDoc(ref, {
    title: data.title || "My Site",
    buttons: buttons
  });

  alert("Button qo‘shildi!");
};

</script>

</body>
</html>
