<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Mini App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #adminPanel {
      display: none;
      margin-top: 20px;
    }
    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>
<body>

<h1 id="title">Loading...</h1>

<button id="loginBtn">Login</button>

<div id="adminPanel">
  <h2>Admin Panel</h2>
  <input id="newTitle" placeholder="Yangi title">
  <button onclick="updateTitle()">Saqlash</button>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 🔴 BU YERNI O'ZGARTIRASAN (Firebase config)
  const firebaseConfig = {
    apiKey: "API_KEY",
    authDomain: "PROJECT_ID.firebaseapp.com",
    projectId: "PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const ADMIN_UID = "SENING_USER_ID"; // 🔴 BU YERGA O'Z UIDingni qo'yasan

  let currentUser = null;

  document.getElementById("loginBtn").onclick = () => {
    signInAnonymously(auth);
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;

      console.log("User UID:", user.uid);

      // Admin tekshirish
      if (user.uid === ADMIN_UID) {
        document.getElementById("adminPanel").style.display = "block";
      }
    }
  });

  // Real-time title
  const docRef = doc(db, "app", "config");

  onSnapshot(docRef, (docSnap) => {
    if (docSnap.exists()) {
      document.getElementById("title").innerText = docSnap.data().title;
    }
  });

  // Update function (faqat admin ishlatadi)
  window.updateTitle = async function () {
    const value = document.getElementById("newTitle").value;

    await setDoc(doc(db, "app", "config"), {
      title: value
    });

    alert("Yangilandi!");
  };

</script>

</body>
</html>
